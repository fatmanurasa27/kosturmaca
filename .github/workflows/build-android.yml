name: Build Android APK/AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev python3-dev \
          openjdk-17-jdk zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libsqlite3-dev
        pip install --upgrade Cython==0.29.33 virtualenv buildozer

    - name: Build with Buildozer (APK)
      run: |
        yes | buildozer android debug

    - name: Build with Buildozer (AAB)
      run: |
        yes | buildozer android release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kosturmaca-apk
        path: bin/*.apk

    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kosturmaca-aab
        path: bin/*.aab
